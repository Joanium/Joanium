<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <script src="../../Features/Themes/index.js"></script>
    <link rel="stylesheet" href="./UI/Styles/ChatPage.css" />
  </head>
  <body>
    <div id="app">
      <div id="titlebar">
        <div id="titlebar-drag"><span class="titlebar-name">Joanium</span></div>
        <div id="titlebar-controls">
          <button id="btn-minimize" title="Minimize">
            <svg
              viewBox="0 0 20 20"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <line x1="5" y1="10" x2="15" y2="10" />
            </svg>
          </button>
          <button id="btn-maximize" title="Maximize / Restore">
            <svg
              viewBox="0 0 20 20"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <rect x="5" y="5" width="10" height="10" rx="2" ry="2" />
            </svg>
          </button>
          <button id="btn-close" title="Close">
            <svg
              viewBox="0 0 20 20"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <line x1="6" y1="6" x2="14" y2="14" />
              <line x1="14" y1="6" x2="6" y2="14" />
            </svg>
          </button>
        </div>
      </div>
      <div id="body-wrap">
        <aside id="sidebar"></aside>
        <div id="theme-panel"></div>
        <div id="avatar-panel"></div>
        <div id="page-outlet"></div>
      </div>
    </div>
    <script type="module" src="../../../Packages/Renderer/Application/Main.js"></script>
  </body>
</html>
